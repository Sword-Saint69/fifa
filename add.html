<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Playlist | KickOff</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="uploader-body">

    <div class="uploader-container">
        <div class="uploader-header">
            <a href="/" class="back-home-link"><i class="fa-solid fa-arrow-left"></i> Back</a>
            <div class="brand">
                <h2>Kick<span>Off</span></h2>
            </div>
            <p class="subtitle">Import Football Playlist (.m3u / .m3u8)</p>
        </div>

        <div class="option-row" style="margin-bottom:1.5rem;display:flex;align-items:center;justify-content:center;gap:8px;">
            <input type="checkbox" id="append-checkbox" style="width:15px;height:15px;accent-color:var(--primary);cursor:pointer;">
            <label for="append-checkbox" style="font-size:0.82rem;color:var(--text-muted);cursor:pointer;user-select:none;">Keep existing channels (append playlist)</label>
        </div>

        <div id="drop-zone" class="drop-zone">
            <div class="drop-zone-content">
                <i class="fa-solid fa-cloud-arrow-up upload-icon"></i>
                <h3>Drag & Drop your playlist here</h3>
                <p>or click to browse local files</p>
                <input type="file" id="file-input" accept=".m3u,.m3u8,.txt" style="display:none;">
            </div>

            <div id="upload-progress-container" class="upload-progress-container hidden">
                <i class="fa-solid fa-circle-notch spin-gauge"></i>
                <h4 id="progress-status">Parsing channels...</h4>
                <div class="progress-bar-wrapper">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
            </div>
        </div>

        <div id="status-feedback" class="status-feedback hidden">
            <p></p>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const progressContainer = document.getElementById('upload-progress-container');
        const progressStatus = document.getElementById('progress-status');
        const progressBar = document.getElementById('progress-bar');
        const statusFeedback = document.getElementById('status-feedback');
        const dropZoneContent = document.querySelector('.drop-zone-content');

        ['dragenter', 'dragover'].forEach(e => {
            dropZone.addEventListener(e, ev => { ev.preventDefault(); dropZone.classList.add('dragover'); }, false);
        });
        ['dragleave', 'drop'].forEach(e => {
            dropZone.addEventListener(e, ev => { ev.preventDefault(); dropZone.classList.remove('dragover'); }, false);
        });

        dropZone.addEventListener('drop', e => {
            const files = e.dataTransfer.files;
            if (files.length > 0) handleFile(files[0]);
        });

        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', e => { if (e.target.files.length > 0) handleFile(e.target.files[0]); });

        function handleFile(file) {
            const appendChecked = document.getElementById('append-checkbox').checked;
            dropZoneContent.classList.add('hidden');
            progressContainer.classList.remove('hidden');
            statusFeedback.classList.add('hidden');

            progressBar.style.width = '30%';
            progressStatus.innerText = `Uploading ${file.name}...`;

            const formData = new FormData();
            formData.append('file', file);

            progressBar.style.width = '60%';
            progressStatus.innerText = 'Parsing channels on server...';

            fetch('/api/upload?append=' + (appendChecked ? 'true' : 'false'), { method: 'POST', body: formData })
                .then(r => r.json())
                .then(data => {
                    progressBar.style.width = '100%';
                    if (data.success) {
                        progressStatus.innerText = 'Done! Loading channels...';
                        statusFeedback.className = 'status-feedback success';
                        statusFeedback.querySelector('p').innerText = data.message;
                        statusFeedback.classList.remove('hidden');
                        setTimeout(() => { window.location.href = '/'; }, 1200);
                    } else {
                        throw new Error(data.message || 'Unknown error.');
                    }
                })
                .catch(err => {
                    progressBar.style.width = '0%';
                    dropZoneContent.classList.remove('hidden');
                    progressContainer.classList.add('hidden');
                    statusFeedback.className = 'status-feedback error';
                    statusFeedback.querySelector('p').innerText = err.message;
                    statusFeedback.classList.remove('hidden');
                });
        }
    </script>
</body>
</html>
